services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=./data/timecapsule.db
      - LOG_PATH=./logs/delivery.log
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
  app_data:
  app_logs:
